server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/wallstreet-rookie
      # For MongoDB Atlas use:
      # uri: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/wallstreet-rookie

  security:
    user:
      name: admin  # only used for actuator/dev, not for app auth

app:
  jwt:
    secret: wallstreet-rookie-jwt-secret-key-min-32-bytes!
    expiration-ms: 86400000  # 24 hours

cors:
  allowed-origins: "http://localhost:3000,http://localhost:5173"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs